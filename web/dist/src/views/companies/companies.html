<!-- ================= OVERLAYS ================= -->

<!-- ADD COMPANY -->
<div class="overlay d-none" id="addCompanyOverlay">
  <div class="overlay-content p-4">
    <button class="overlay-close" id="closeAddCompany">✕</button>

    <h5 class="mb-3">Add New Company</h5>

    <form id="addCompanyForm">
      <div class="mb-3">
        <label class="form-label">Company Name</label>
        <input type="text" class="form-control" id="addCompanyName" required>
      </div>

      <div class="d-flex gap-3">
        <button type="button" class="btn btn-danger w-50" id="cancelAddCompany">
          Cancel
        </button>
        <button type="submit" class="btn btn-green w-50">
          Confirm
        </button>
      </div>
    </form>
  </div>
</div>

<!-- EDIT COMPANY -->
<div class="overlay d-none" id="editCompanyOverlay">
  <div class="overlay-content p-4">
    <button class="overlay-close" id="closeEditCompany">✕</button>

    <h4 class="mb-4">Edit Existing Company</h4>

    <form id="editCompanyForm">
      <div class="mb-3">
        <label class="form-label">Company Name</label>
        <input type="text" class="form-control" id="editCompanyName" required>
      </div>

      <div class="mb-4">
        <label class="form-label">Company Branch</label>
        <input type="text" class="form-control" id="editCompanyBranch">
      </div>

      <div class="d-flex gap-3">
        <button type="button" class="btn btn-danger w-50" id="cancelEditCompany">
          Cancel
        </button>
        <button type="submit" class="btn btn-green w-50">
          Update
        </button>
      </div>
    </form>
  </div>
</div>

<!-- DELETE COMPANY -->
<div class="overlay d-none" id="deleteCompanyOverlay">
  <div class="overlay-content p-4 text-center">
    <button class="overlay-close" id="closeDeleteCompany">✕</button>

    <h5 class="mb-4">
      Are you sure you want to<br>
      delete this company?
    </h5>

    <div class="d-flex gap-3 justify-content-center">
      <button class="btn btn-danger px-4" id="cancelDeleteCompany">
        No
      </button>
      <button class="btn btn-green px-4" id="confirmDeleteCompany">
        Yes
      </button>
    </div>
  </div>
</div>
