    <!-- Add Order Overlay -->
    <div class="overlay d-none" id="addOrderOverlay">

        <div class="overlay-content p-4">

            <button class="overlay-close" id="closeAddOrder">✕</button>

            <h5 class="mb-3">Add New Order</h5>

            <form class="w-100">

                <!-- Customer -->
                <div class="mb-3">
                    <label class="form-label">Customer Name</label>
                    <select class="form-select" required>
                        <option value="" selected disabled hidden>Select Customer</option>
                        <option>Pedro Garcia</option>
                        <option>Maria Santos</option>
                        <option>Juan Cruz</option>
                    </select>
                </div>

                <!-- Style / Size / Material / Color -->
                <div class="row gx-2 gy-3 mb-3">
                    <div class="col-6 col-md-3">
                        <label class="form-label">Style</label>
                        <input class="form-control" placeholder="Enter Style">
                    </div>
                    <div class="col-6 col-md-3">
                        <label class="form-label">Size</label>
                        <input class="form-control" placeholder="Enter Size">
                    </div>
                    <div class="col-6 col-md-3">
                        <label class="form-label">Material</label>
                        <select class="form-select">
                            <option value="" selected disabled hidden>Select Material</option>
                            <option>Helga</option>
                            <option>Leather</option>
                            <option>Suede</option>
                            <option>Patent</option>
                        </select>
                    </div>
                    <div class="col-6 col-md-3">
                        <label class="form-label">Color</label>
                        <input class="form-control" placeholder="Enter Color">
                    </div>
                </div>

                <!-- Heel -->
                <div class="row gx-2 gy-3 mb-3">
                    <div class="col-4">
                        <label class="form-label">Heel Type</label>
                        <select class="form-select">
                            <option value="" selected disabled hidden>Select Heel</option>
                            <option>Square</option>
                            <option>Stiletto</option>
                            <option>Block</option>
                            <option>Kitten</option>
                        </select>
                    </div>
                    <div class="col-4">
                        <label class="form-label">Heel Size</label>
                        <input class="form-control" placeholder="Enter Heel Size">
                    </div>
                    <div class="col-4">
                        <label class="form-label">Mold Type</label>
                        <select class="form-select">
                            <option value="" selected disabled hidden>Select Mold</option>
                            <option>Liz</option>
                            <option>Milani</option>
                            <option>Classic</option>
                            <option>Modern</option>
                        </select>
                    </div>
                </div>

                <!-- Options -->
                <div class="row mb-3">
                    <div class="col options-group">
                        <label class="form-label d-block">Buckle</label>
                        <div class="option-radios">
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="addBuckle">
                                <label class="form-check-label">Yes</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="addBuckle" checked>
                                <label class="form-check-label">No</label>
                            </div>
                        </div>
                    </div>

                    <div class="col options-group">
                        <label class="form-label d-block">Sling Back</label>
                        <div class="option-radios">
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="addSling">
                                <label class="form-check-label">Yes</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="addSling" checked>
                                <label class="form-check-label">No</label>
                            </div>
                        </div>
                    </div>

                    <div class="col options-group">
                        <label class="form-label d-block">Platform</label>
                        <div class="option-radios">
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="addPlatform">
                                <label class="form-check-label">Yes</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="addPlatform" checked>
                                <label class="form-check-label">No</label>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Quantity / Price -->
                <div class="row gx-2 mb-4">
                    <div class="col-6">
                        <label class="form-label">Quantity</label>
                        <input class="form-control" value="1">
                    </div>
                    <div class="col-6">
                        <label class="form-label">Price</label>
                        <input class="form-control" placeholder="Enter Price">
                    </div>
                </div>

                <!-- Buttons -->
                <div class="d-flex gap-3 mt-3">
                    <button type="button" class="btn btn-danger w-50" id="cancelAddOrder">
                        Cancel
                    </button>
                    <button type="submit" class="btn btn-green w-50">
                        Confirm
                    </button>
                </div>

            </form>

        </div>
    </div>

                <div class="row gx-2 gy-3 mb-3">

                    <div class="col-4">

                        <select class="form-select" required>

                            <option value="liz">Liz</option>
                            <option value="milani">Milani</option>
                            <option value="classic">Classic</option>
                            <option value="modern">Modern</option>
                            <option value="slim">Slim</option>
                        </select>

                    </div>
                </div>

                <!-- OPTIONS -->
                <div class="row mb-4">

                    <!-- Buckle -->
                    <div class="col options-group">
                        <label class="form-label d-block">Buckle</label>
                        <div class="option-radios">
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="buckle" checked>
                                <label class="form-check-label">Yes</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="buckle">
                                <label class="form-check-label">No</label>
                            </div>
                        </div>
                    </div>

                    <!-- Sling Back -->
                    <div class="col options-group">
                        <label class="form-label d-block">Sling Back</label>
                        <div class="option-radios">
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="slingback">
                                <label class="form-check-label">Yes</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="slingback" checked>
                                <label class="form-check-label">No</label>
                            </div>
                        </div>
                    </div>

                    <!-- Platform -->
                    <div class="col options-group">
                        <label class="form-label d-block">Platform</label>
                        <div class="option-radios">
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="platform">
                                <label class="form-check-label">Yes</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="platform" checked>
                                <label class="form-check-label">No</label>
                            </div>
                        </div>
                    </div>

                </div>


                <!-- BUTTONS -->
                <div class="d-flex gap-3">
                    <button type="button" class="btn btn-danger w-50" id="cancelEditOrder">
                        Cancel
                    </button>
                    <button type="submit" class="btn btn-green w-50">
                        Update
                    </button>
                </div>

            </form>
        </div>
    </div>

    <!-- Delete Order Overlay -->
    <div class="overlay d-none" id="deleteOrderOverlay">

        <div class="overlay-content p-4 text-center">
