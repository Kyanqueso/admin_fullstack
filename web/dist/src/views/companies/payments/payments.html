    <!-- Page Title -->
    <h2 class="mb-2 mt-2">Client Payment List</h2>

    <!-- Search / Sort / Add -->
    <div class="row align-items-end mb-4">

        <!-- Search -->
        <div class="col-12 col-md-4 mb-2">
            <label class="form-label invisible">Search</label>
            <div class="input-group">
                <span class="input-group-text"><img src="data:image/svg+xml,%3csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20640%20640'%3e%3c!--!Font%20Awesome%20Free%207.1.0%20by%20@fontawesome%20-%20https://fontawesome.com%20License%20-%20https://fontawesome.com/license/free%20Copyright%202026%20Fonticons,%20Inc.--%3e%3cpath%20d='M480%20272C480%20317.9%20465.1%20360.3%20440%20394.7L566.6%20521.4C579.1%20533.9%20579.1%20554.2%20566.6%20566.7C554.1%20579.2%20533.8%20579.2%20521.3%20566.7L394.7%20440C360.3%20465.1%20317.9%20480%20272%20480C157.1%20480%2064%20386.9%2064%20272C64%20157.1%20157.1%2064%20272%2064C386.9%2064%20480%20157.1%20480%20272zM272%20416C351.5%20416%20416%20351.5%20416%20272C416%20192.5%20351.5%20128%20272%20128C192.5%20128%20128%20192.5%20128%20272C128%20351.5%20192.5%20416%20272%20416z'/%3e%3c/svg%3e" alt="search" width="20"
                        height="20"></span>
                <input type="text" class="form-control" placeholder="Search name">
            </div>
        </div>

        <!-- Sort -->
        <div class="col-12 col-md-2 mb-2">
            <label class="form-label"></label>
            <select class="form-select mt-2">
                <option value="" selected disabled hidden>Sort by</option>
                <option value="name">Name</option>
                <option value="recent">Recently Added</option>
                <option value="alpha">Alphabetical</option>
            </select>
        </div>



    </div>

    <!-- Table -->
    <div class="table-responsive">
        <table class="table align-middle">

            <!-- Table Head -->
            <thead class="table-header">
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Total Amount</th>
                    <th>Date of Order</th>
                    <th>Balance</th>
                    <th>Balance Cleared Date</th>
                    <th>Transaction History</th>
                    <th>Edit</th>
                </tr>
            </thead>

            <!-- Table Body -->
            <tbody>
            </tbody>
        </table>
    </div>

    <!-- Transaction History Overlay -->
    <div class="overlay d-none" id="transactionHistoryOverlay">
        <div class="overlay-content p-4">

            <button class="overlay-close" id="closeTransactionOverlay">✕</button>

            <h5 class="mb-3">Transaction History</h5>

            <!-- Customer summary -->
            <div class="transaction-summary">
                <div><strong>Customer:</strong> <span id="historyCustomerName"></span></div>
                <div><strong>Total Price:</strong> <span id="historyTotalPrice"></span></div>
                <div><strong>Balance:</strong> <span id="historyBalance"></span></div>
            </div>

            <!-- Table -->
            <table class="table transaction-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Payment Amount</th>
                        <th>Payment Date</th>
                    </tr>
                </thead>
                <tbody id="historyTransactionBody">
                </tbody>
            </table>

            <button class="btn transaction-close-btn mt-3" id="closeTransactionBtn">
                Close
            </button>

        </div>
    </div>

    <!-- Edit Transaction History Overlay -->
    <div class="overlay d-none" id="editTransactionOverlay">
        <div class="overlay-content p-4">

            <button class="overlay-close" id="closeEditTransaction">✕</button>

            <h5 class="mb-3">Edit Transaction History</h5>

            <!-- Summary -->
            <div class="transaction-summary mb-3">
                <div><strong>Customer:</strong> <span id="editCustomerName"></span></div>
                <div><strong>Total Price:</strong> <span id="editTotalPrice"></span></div>
                <div><strong>Current Balance:</strong> <span id="editBalance"></span></div>
            </div>

            <!-- Header row -->
            <div class="d-flex justify-content-between align-items-center mb-2">
                <strong>Transactions</strong>
                <button class="btn btn-green btn-sm" id="addTransactionBtn">
                    + Add Transaction
                </button>
            </div>

            <!-- Transactions container -->
            <div id="transactionsContainer">
            </div>

            <!-- Buttons -->
            <div class="d-flex gap-3 mt-4">
                <button class="btn btn-danger w-50" id="cancelEditTransaction">
                    Cancel
                </button>
                <button class="btn btn-green w-50" id="saveTransactionBtn">
                    Save Changes
                </button>
            </div>

        </div>
    </div>

    <!-- Scripts -->
    <script src="../../../assets/bootstrap/bootstrap.bundle.min.js"></script>
