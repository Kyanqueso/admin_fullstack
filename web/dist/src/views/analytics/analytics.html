<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Import CSS Files and Local Bootstrap-->

    <title>Analytics Page</title>
  <script type="module" crossorigin src="../../../assets/analytics-DfMXSUx5.js"></script>
  <link rel="modulepreload" crossorigin href="../../../assets/bootstrap.min-BB4Wbeoi.js">
  <link rel="modulepreload" crossorigin href="../../../assets/apiCache-BsFi2VyI.js">
  <link rel="stylesheet" crossorigin href="../../../assets/bootstrap-B9K7SMpr.css">
  <link rel="stylesheet" crossorigin href="../../../assets/analytics-CeN7d2by.css">
</head>
<body>
    <!-- Logout button -->
    <div class="d-flex justify-content-end">
        <button id="logout-btn"
                class="btn btn-danger my-3 me-2 me-md-5 fw-bold">
            Logout
        </button>
    </div>

    <nav id="navigation" class="w-75 d-flex flex-wrap mt-1 mb-4 mx-auto justify-content-center gap-4 text-center">
        <a class="nav-link fs-4 p-3 p-lg-4 active">Analytics</a>
        <a class="nav-link fs-4 p-3 p-lg-4 inactive" href="../companies/companies.html">Clients</a>
        <a class="nav-link fs-4 p-3 p-lg-4 inactive" href="../web_content/web_content.html">Website Content</a>
    </nav>

    <hr class="w-75 mx-auto">

    <!-- Main container: w-88 same as global.css-->
    <div class="w-88 mx-auto mb-5">

        <!-- Analytics Overview title -->
        <h1 class="mb-3 fw-bold">Analytics Overview</h1>

        <!-- Loading -->
        <div id="dashboard-loader" class="text-center my-5 w-100">
            <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p class="mt-2 text-muted fw-bold">Loading Analytics...</p>
        </div>
        <!-- Row gap = 4 -->
        <div id="dashboard-content" class="row g-4 d-none">

            <!-- Column 1 (Left) -->
            <div class="col-12 col-lg-7"> <!-- 7`/12 col size on big screen -->

                <!-- Chart Card (Total Sales Header and Line Chart-->
                <div class="analytics-card chart-card box-drop-shadow p-5 h-100 rounded">

                    <!-- Header row: title left, total value right -->
                    <div class="d-flex justify-content-between align-items-start mb-3">
                        <!--Total Sales Label -->
                        <h5 id="total-sales-label" class="fw-bold mb-2">Total Sales</h5>
                        <!-- Total Sales Value -->
                        <h5 id="total-sales-value" class="total-sales-amount fw-bold">---</h5>
                    </div>

                    <!-- Line Chart-->
                    <div class="sales-chart-container">
                        <!-- Chart.js element -->
                        <canvas id="sales-chart"></canvas>
                    </div>

                </div>
            </div>
            <!-- End of Column 1 (Left) -->

            <!-- Column 2 (Right) -->
            <div class="col-12 col-lg-5"><!-- 5/12 col size on big screen -->

                <!-- Flex Column to stack -->
                <div class="d-flex flex-column gap-3">

                    <!-- Analytics Card 1: Uncollected Balance -->
                    <div class="analytics-card summary-card box-drop-shadow p-3">

                        <!-- Card Header label -->
                        <div class="d-flex align-items-center gap-2 mb-1">
                            <span class="trend-icon">⭧</span>
                            <span class="card-label fw-bold">Uncollected Balance</span>
                        </div>

                        <!-- Card Subheading: time period -->
                        <span class="card-subtitle">Last 12 months</span>

                        <!-- Card Value: JS Api -->
                        <div id="uncollected-balance" class="card-value">---</div>
                    </div>

                    <!-- Analytics Card 2: Annual Sales -->
                    <div class="analytics-card summary-card box-drop-shadow p-3">

                        <!-- Card Header: label -->
                        <div class="d-flex align-items-center gap-2 mb-1">
                            <span class="trend-icon">⭧</span>
                            <span class="card-label fw-bold">Annual Sales</span>
                        </div>

                        <!-- Card Subheading: year period -->
                        <span id="annual-sales-year" class="card-subtitle">Year 2025</span>

                        <!-- Card Value: JS Api -->
                        <div id="annual-sales" class="card-value">---</div>
                    </div>

                    <!-- Analytics Card 3: Total Orders -->
                    <div class="analytics-card summary-card box-drop-shadow p-3">

                        <!-- Card Header label -->
                        <div class="d-flex align-items-center gap-2 mb-1">
                            <span class="trend-icon">⭧</span>
                            <span class="card-label fw-bold">Total Orders</span>
                        </div>

                        <!-- Card Subheading: time period -->
                        <span class="card-subtitle">Last 30 days</span>

                        <!-- Card Value: JS Api -->
                        <div id="total-orders" class="card-value">---</div>
                    </div>

                    <!-- Analytics Card 4: Pending Orders -->
                    <div class="analytics-card summary-card box-drop-shadow p-3">

                        <!-- Card Header label -->
                        <div class="d-flex align-items-center gap-2 mb-1">
                            <span class="trend-icon">⭧</span>
                            <span class="card-label fw-bold">Pending Orders</span>
                        </div>

                        <!-- Card Subheading: time period -->
                        <span class="card-subtitle">Last 30 days</span>

                        <!-- Card Value: JS Api -->
                        <div id="pending-orders" class="card-value">---</div>
                    </div>


                </div>

            </div>

        </div>
    </div>

    <!-- Logout Confirmation Overlay -->
    <div id="logout-overlay" class="overlay d-none">
        <div class="overlay-content p-4 position-relative">
            <button id="logout-overlay-close" class="overlay-close btn p-3 position-absolute top-0 end-0">
                <img src="data:image/svg+xml,%3csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20640%20640'%3e%3c!--!Font%20Awesome%20Free%207.1.0%20by%20@fontawesome%20-%20https://fontawesome.com%20License%20-%20https://fontawesome.com/license/free%20Copyright%202026%20Fonticons,%20Inc.--%3e%3cpath%20d='M504.6%20148.5C515.9%20134.9%20514.1%20114.7%20500.5%20103.4C486.9%2092.1%20466.7%2093.9%20455.4%20107.5L320%20270L184.6%20107.5C173.3%2093.9%20153.1%2092.1%20139.5%20103.4C125.9%20114.7%20124.1%20134.9%20135.4%20148.5L278.3%20320L135.4%20491.5C124.1%20505.1%20125.9%20525.3%20139.5%20536.6C153.1%20547.9%20173.3%20546.1%20184.6%20532.5L320%20370L455.4%20532.5C466.7%20546.1%20486.9%20547.9%20500.5%20536.6C514.1%20525.3%20515.9%20505.1%20504.6%20491.5L361.7%20320L504.6%20148.5z'/%3e%3c/svg%3e" alt="Close" width="24" height="24">
            </button>
            <h5 class="mb-4 text-center">Do you want to log out?</h5>
            <div class="d-flex justify-content-center gap-3">
                <button id="logout-no" class="btn btn-secondary px-4">No</button>
                <button id="logout-yes" class="btn btn-danger px-4">Yes</button>
            </div>
        </div>
    </div>

    <!-- Chart.js library: must be loaded BEFORE analytics.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- UNTIL HERE -->


    <!-- Call analytics.js and bootstrap bundle.js -->
    <script src="../../assets/bootstrap/bootstrap.bundle.min.js"></script>
</body>
