            <form id="overlay-form" class="d-none mt-3">
                <label class="form-label text-black">Shoe Name</label>
                <input type="text" id="shoe-name" name="shoeName" class="form-control mb-2" placeholder="Shoe Name" required>

                <label class="form-label text-black">Price</label>
                <input type="text" id="shoe-price" name="shoePrice" class="form-control mb-2" placeholder="Price" required>

                <!-- Existing images shown during edit -->

                    <label class="form-label text-black">Current Images</label>
                    <div id="existing-images" class="d-flex flex-wrap gap-2"></div>
                </div>

                <label id="image-upload-label" class="form-label text-black">Upload Images (1-5 required)</label>
                <input type="file" id="shoe-images" name="shoeImages" class="form-control mb-2" accept="image/*" multiple>
