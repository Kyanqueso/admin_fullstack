<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Page</title>
  <script type="module" crossorigin src="../../../assets/login-Cv6F9SlK.js"></script>
  <link rel="modulepreload" crossorigin href="../../../assets/bootstrap.min-BB4Wbeoi.js">
  <link rel="stylesheet" crossorigin href="../../../assets/bootstrap-B9K7SMpr.css">
  <link rel="stylesheet" crossorigin href="../../../assets/login-DW-m0YWz.css">
</head>
<body>
  <h1 class="text-center my-5">Admin Portal</h1>
  <form id="login-form" class="p-4 border rounded box-drop-shadow mx-auto" style="background-color: var(--color-accent);">
    <h3 class="mt-2 mb-4 fw-bold text-center">Login</h3>
    
    <div id="error-alert" class="alert alert-danger d-none" role="alert"></div>

    <div class="mb-3">
      <label for="email" class="form-label">Email</label>
      <input type="email" class="form-control" id="email" placeholder="Enter email">
    </div>
    
    <div class="mb-4">
      <label for="password" class="form-label">Password</label>
      <input type="password" class="form-control" id="password" placeholder="Enter password">
    </div>
    
    <button id="login-btn" type="submit" class="btn btn-primary w-100 fw-bold">Login</button>
  </form>

  <script src="../../assets/bootstrap/bootstrap.bundle.min.js"></script>
</body>
</html>
