<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Import CSS Files and Local Bootstrap-->
    <link rel="stylesheet" href="../../css/global.css">
    <link rel="stylesheet" href="web_content.css">
    <link rel="stylesheet" href="../../assets/bootstrap/bootstrap.min.css">

    <title>Website Content Management Page</title>
</head>
<body>
    <!-- Logout button -->
    <div class="d-flex justify-content-end">
        <button id="logout-btn" class="btn btn-danger my-3 me-2 me-md-5 fw-bold">
            Logout
        </button>
    </div>

    <nav id="navigation" class="w-75 d-flex flex-wrap mt-1 mb-4 mx-auto justify-content-center gap-4 text-center">
        <a class="nav-link fs-4 p-3 p-lg-4 inactive" href="../analytics/analytics.html">Analytics</a>
        <a class="nav-link fs-4 p-3 p-lg-4 inactive" href="../companies/companies.html">Clients</a>
        <a class="nav-link fs-4 p-3 p-lg-4 active">Website Content</a>
    </nav>

    <hr class="w-75 mx-auto">

    <div class="d-flex flex-column flex-sm-row align-items-center justify-content-between w-88 mx-auto mb-4 gap-3">
        <h1 id="scm" class="mb-0 fw-bold">Shoe Collection Management</h1>
        <button id="add-shoe-btn" class="btn px-lg-4 py-2 add-edit-shoe">
            <img src="../../assets/icons/plus.svg" alt="Add" width="20" height="20">
            Add New Shoe
        </button>
    </div>

    <!-- Use hardcoded for now since will transfer to supabase 
    <div class="card h-100 box-drop-shadow w-25 mx-5 mb-5">
        <img src="https://placehold.co/400" class="card-img-top" alt="Shoe Name">
        <div class="accent-bg card-body d-flex flex-column">
            <h5 class="card-title"><strong>Shoe Name</strong></h5>
            <p class="card-text flex-grow-1">PHP 1,800</p>
            <div class="d-flex flex-row gap-3">
                <a href="#" class="btn w-50 add-edit-shoe edit-shoe-btn">
                    <img src="../../assets/icons/pencil.svg" alt="Edit" width="18" height="18">
                    Edit
                </a>
                <a href="#" class="btn btn-red w-50 delete-shoe-btn">
                    <img src="../../assets/icons/trash-can.svg" alt="Delete" width="18" height="18">
                    Delete
                </a>
            </div>
        </div>
    </div>
    -->
    
    <div class="container my-4">
        <div id="shoe-grid" class="row g-4">
            <!-- Cards will be injected here -->
        </div>
    </div>

    <!--Overlay Section-->
    <div id="shoe-overlay" class="overlay d-none">
        <div class="overlay-content p-4 position-relative">
            <button id="overlay-close" class="overlay-close btn p-3 mb-4 position-absolute top-0 end-0">
                <img src="../../assets/icons/x-solid.svg" alt="Close" width="24" height="24">
            </button>

            <h2 id="overlay-title" class="text-start">Title</h2>
            <p id="overlay-message" class="text-start">Message goes here...</p>

            <!-- Loading Spinner -->
            <div id="overlay-loading" class="d-none text-center my-3">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
                <p class="mt-2">Processing...</p>
            </div>

            <!-- Success / Error Message -->
            <div id="overlay-status" class="d-none my-2 p-2 rounded"></div>

            <!-- Form for Add/Edit -->
            <form id="overlay-form" class="d-none mt-3">
                <label class="form-label text-black">Shoe Name</label>
                <input type="text" id="shoe-name" name="shoeName" class="form-control mb-2" placeholder="Shoe Name" required>

                <label class="form-label text-black">Price</label>
                <input type="text" id="shoe-price" name="shoePrice" class="form-control mb-2" placeholder="Price" required>

                <label class="form-label text-black">Upload Image</label>
                <input type="file" id="shoe-image" name="shoeImage" class="form-control mb-2" accept="image/*" required>
            </form>

            <!-- Buttons -->
            <div class="d-flex justify-content-end gap-2 mt-3">
                <button id="overlay-cancel" class="btn btn-secondary">Cancel</button>
                <button id="overlay-confirm" class="btn btn-green">Confirm</button>
            </div>
        </div>
    </div>

    <!-- Call web_content.js and bootstrap bundle.js -->
    <script type="module" src="web_content.js"></script>
    <script src="../../assets/bootstrap/bootstrap.bundle.min.js"></script>
</body>
