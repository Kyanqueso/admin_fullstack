<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Import CSS Files and Local Bootstrap-->
    <link rel="stylesheet" href="../../../assets/bootstrap/bootstrap.min.css">
    <link rel="stylesheet" href="../../../css/global.css">
    <link rel="stylesheet" href="complete_orders.css">


    <title>Client Page</title>
</head>

<body class="px-4">

    <div class="client-tabs-bar">
        <div class="client-tabs-inner">
            <a href="../companies.html" class="client-tab-back">
                <img src="../../../assets/icons/back-btn.svg" alt="Back" width="14" height="14">
                Back
            </a>
            <span class="client-tab-divider"></span>
            <a href="../clients/clients.html" class="client-tab-link">Customer List</a>
            <a href="../orders/orders.html" class="client-tab-link">Orders</a>
            <a href="../payments/payments.html" class="client-tab-link">Payment</a>
            <a href="../complete_orders/complete_orders.html" class="client-tab-link active">Completed Order</a>
        </div>
    </div>

    <!-- Page Title -->
    <h2 class="mb-2 mt-2" id="companyTitle">Completed Orders</h2>

    <!-- Search / Sort / Add -->
    <div class="row align-items-end mb-4">

        <!-- Search -->
        <div class="col-12 col-md-4 mb-2">
            <label class="form-label invisible">Search</label>
            <div class="input-group">
                <span class="input-group-text"><img src="../../../assets/icons/search.svg" alt="search" width="20"
                        height="20"></span>
                <input type="text" class="form-control" placeholder="Search name">
            </div>
        </div>

        <!-- Sort -->
        <div class="col-12 col-md-2 mb-2">
            <label class="form-label"></label>
            <select class="form-select mt-2">
                <option value="" selected disabled hidden>Sort by</option>
                <option value="name">Name</option>
                <option value="recent">Recently Added</option>
                <option value="alpha">Alphabetical</option>
            </select>
        </div>



    </div>

    <!-- Table -->
    <div class="table-responsive">
        <table class="table align-middle">

            <!-- Table Head -->
            <thead class="table-header">
                <tr>
                    <th>Order ID</th>
                    <th>Customer Name</th>
                    <th>Style</th>
                    <th>Size</th>
                    <th>Material</th>
                    <th>Color</th>
                    <th>Heel Type</th>
                    <th>Heel Size</th>
                    <th>Mold Type</th>
                    <th>Buckle</th>
                    <th>Slingback</th>
                    <th>Platform</th>
                    <th>Quantity</th>
                    <th>Price</th>
                    <th>Total Amount</th>
                </tr>
            </thead>

            <!-- Table Body -->
            <tbody id="completedOrdersTableBody">
            </tbody>
        </table>
    </div>


    <!-- Scripts -->
    <script type="module" src="complete_orders.js"></script>
    <script src="../../../assets/bootstrap/bootstrap.bundle.min.js"></script>

</body>
