<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- CSS -->
    <link rel="stylesheet" href="../../../assets/bootstrap/bootstrap.min.css">
    <link rel="stylesheet" href="../../../css/global.css">
    <link rel="stylesheet" href="clients.css">

    <title>Client Page</title>
</head>

<body class="px-4">

    <!-- Back Button -->
    <div class="my-3">
        <a href="../companies.html" class="text-decoration-none">
            <img src="../../../assets/icons/back-btn.svg" alt="Back" width="20">
        </a>
    </div>

    <!-- Tabs -->
    <div class="row g-3 mb-4 client-tabs">
        <div class="col-12 col-sm-6 col-md-3">
            <a href="../clients/clients.html" class="text-decoration-none d-block">
                <button class="btn tab-btn active w-100 p-3">Customer List</button>
            </a>
        </div>

        <div class="col-12 col-sm-6 col-md-3">
            <a href="../orders/orders.html" class="text-decoration-none d-block">
                <button class="btn tab-btn w-100 p-3">Orders</button>
            </a>
        </div>

        <div class="col-12 col-sm-6 col-md-3">
            <a href="../payments/payments.html" class="text-decoration-none d-block">
                <button class="btn tab-btn w-100 p-3">Payment</button>
            </a>
        </div>

        <div class="col-12 col-sm-6 col-md-3">
            <a href="../complete_orders/complete_orders.html" class="text-decoration-none d-block">
                <button class="btn tab-btn w-100 p-3">Completed Order</button>
            </a>
        </div>
    </div>

    <!-- Page Title -->
    <h2 class="mb-2 mt-2" id="companyTitle">Client List</h2>

    <!-- Search / Sort / Add -->
    <div class="row align-items-end mb-4">
        <div class="col-12 col-md-4 mb-2">
            <label class="form-label invisible">Search</label>
            <div class="input-group">
                <span class="input-group-text">
                    <img src="../../../assets/icons/search.svg" width="20">
                </span>
                <input type="text" class="form-control" placeholder="Search name">
            </div>
        </div>

        <div class="col-12 col-md-2 mb-2">
            <select class="form-select mt-2">
                <option value="" selected disabled hidden>Sort by</option>
                <option value="az">A–Z (First Name)</option>
                <option value="za">Z–A (First Name)</option>
                <option value="recent">Recently Added</option>
                <option value="oldest">Oldest First</option>
            </select>
        </div>

        <div class="col-12 col-md-6 text-md-end mt-3 mt-md-0">
            <button class="btn btn-outline-dark" id="openOverlay">
                + Add New Customer
            </button>
        </div>
    </div>

    <!-- TABLE -->
    <div class="table-responsive">
        <table class="table align-middle">
            <thead class="table-header">
                <tr>
                    <th>First Name</th>
                    <th>Last Name</th>
                    <th>Address</th>
                    <th>Viber</th>
                    <th>Last Updated</th>
                    <th>Notes</th>
                    <th>Edit</th>
                    <th>Delete</th>
                </tr>
            </thead>

            <!--  EMPTY TBODY (JS FILLS THIS) -->
            <tbody>
                <!-- JS will populate clients here -->
            </tbody>

        </table>
    </div>

    <!-- ADD CLIENT OVERLAY -->
    <div class="overlay d-none" id="addClientOverlay">
        <div class="overlay-content p-4">
            <button class="overlay-close" id="closeOverlay">✕</button>

            <h5 class="mb-3">Add New Client</h5>

            <form id="overlay-form">

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">First Name</label>
                        <input type="text" class="form-control" placeholder="Juan">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Last Name</label>
                        <input type="text" class="form-control" placeholder="Dela Cruz">
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Address</label>
                        <input type="text" class="form-control" placeholder="123 Main Street">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Viber</label>
                        <input type="text" class="form-control" placeholder="+63 *** *** ****">
                    </div>
                </div>

                <!-- Buttons INSIDE form and overlay-content -->
                <div class="row mt-4">
                    <div class="col-6">
                        <button type="button" class="btn btn-danger w-100" id="cancelOverlay">
                            Cancel
                        </button>
                    </div>

                    <div class="col-6">
                        <button type="submit" class="btn btn-green w-100">
                            Confirm
                        </button>
                    </div>
                </div>

            </form>
        </div>
    </div>


    <!-- NOTES OVERLAY -->
    <div class="overlay d-none" id="clientNotesOverlay">
        <div class="overlay-content p-4">
            <button class="overlay-close" id="closeNotesOverlay">✕</button>

            <h5 class="mb-3">Client Notes</h5>

            <form>
                <textarea class="form-control mb-4" rows="7" placeholder="Enter client notes here..."></textarea>

                <div class="text-center">
                    <button type="submit" class="btn btn-green px-4">
                        Save Changes
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- EDIT CLIENT OVERLAY -->
    <div class="overlay d-none" id="editClientOverlay">
        <div class="overlay-content p-4">
            <button class="overlay-close" id="closeEditOverlay">✕</button>

            <h5 class="mb-3">Update Existing Client</h5>

            <form>
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">First Name</label>
                        <input type="text" class="form-control" id="editFirstName">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Last Name</label>
                        <input type="text" class="form-control" id="editLastName">
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Address</label>
                    <input type="text" class="form-control" id="editAddress">
                </div>

                <div class="mb-4">
                    <label class="form-label">Viber</label>
                    <input type="text" class="form-control" id="editViber">
                </div>

                <div class="d-flex gap-3">
                    <button type="button" class="btn btn-danger w-50" id="cancelEditOverlay">
                        Cancel
                    </button>
                    <button type="submit" class="btn btn-green w-50">
                        Update
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- DELETE CLIENT OVERLAY -->
    <div class="overlay d-none" id="deleteClientOverlay">
        <div class="overlay-content p-4 text-center">
            <button class="overlay-close" id="closeDeleteOverlay">✕</button>

            <h5 class="mb-4">
                Are you sure you want to<br>delete this client?
            </h5>

            <div class="d-flex justify-content-center gap-3">
                <button class="btn btn-danger px-4" id="cancelDelete">No</button>
                <button class="btn btn-green px-4" id="confirmDelete">Yes</button>
            </div>
        </div>
    </div>

    <!-- JS -->
    <script type="module" src="clients.js"></script>
    <script src="../../../assets/bootstrap/bootstrap.bundle.min.js"></script>

</body>

</html>
