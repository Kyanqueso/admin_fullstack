<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Import CSS Files and Local Bootstrap-->
    <link rel="stylesheet" href="../../../assets/bootstrap/bootstrap.min.css">
    <link rel="stylesheet" href="../../../css/global.css">
    <link rel="stylesheet" href="payments.css">

    <title>Client Payment List</title>
</head>

<body class="px-4">

    <!-- Back Button -->
    <div class="my-3">
        <a href="../companies.html" class="text-decoration-none">
            <img src="../../../assets/icons/back-btn.svg" alt="Back" width="20" height="20">
        </a>
    </div>

    <!-- Tabs -->
    <div class="row g-3 mb-4 client-tabs">

        <div class="col-12 col-sm-6 col-md-3">
            <a href="../clients/clients.html" class="text-decoration-none d-block">
                <button class="btn tab-btn w-100 p-3">
                    Customer List
                </button>
            </a>
        </div>

        <div class="col-12 col-sm-6 col-md-3">
            <a href="../orders/orders.html" class="text-decoration-none d-block">
                <button class="btn tab-btn w-100 p-3">
                    Orders
                </button>
            </a>
        </div>

        <div class="col-12 col-sm-6 col-md-3">
            <a href="../payments/payments.html" class="text-decoration-none d-block">
                <button class="btn tab-btn w-100 p-3 active">
                    Payment
                </button>
            </a>
        </div>

        <div class="col-12 col-sm-6 col-md-3">
            <a href="../complete_orders/complete_orders.html" class="text-decoration-none d-block">
                <button class="btn tab-btn w-100 p-3">
                    Completed Order
                </button>
            </a>
        </div>

    </div>

    <!-- Page Title -->
    <h2 class="mb-2 mt-2">Client Payment List</h2>

    <!-- Search / Sort -->
    <div class="row align-items-end mb-4">

        <div class="col-12 col-md-4 mb-2">
            <div class="input-group">
                <span class="input-group-text">
                    <img src="../../../assets/icons/search.svg" width="20">
                </span>
                <input type="text" class="form-control" placeholder="Search name">
            </div>
        </div>

        <div class="col-12 col-md-2 mb-2">
            <select class="form-select mt-2">
                <option value="" selected disabled hidden>Sort by</option>
                <option value="name">Name</option>
                <option value="recent">Recently Added</option>
                <option value="alpha">Alphabetical</option>
            </select>
        </div>

    </div>

    <!-- Table -->
    <div class="table-responsive">
        <table class="table align-middle">

            <thead class="table-header">
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Total Amount</th>
                    <th>Date of Order</th>
                    <th>Balance</th>
                    <th>Balance Cleared Date</th>
                    <th>Transaction History</th>
                    <th>Edit</th>
                </tr>
            </thead>

            <tbody id="paymentsTableBody">
                <!-- Dynamically rendered by JS -->
            </tbody>

        </table>
    </div>

    <!-- ============================= -->
    <!-- Transaction History Overlay -->
    <!-- ============================= -->
    <div class="overlay d-none" id="transactionHistoryOverlay">
        <div class="overlay-content p-4">

            <button class="overlay-close" id="closeTransactionOverlay">✕</button>

            <h5 class="mb-3">Transaction History</h5>

            <!-- Dynamic Summary -->
            <div class="transaction-summary">
                <div><strong>Customer:</strong> <span id="historyCustomerName"></span></div>
                <div><strong>Total Price:</strong> <span id="historyTotalPrice"></span></div>
                <div class="balance">
                    <strong>Balance:</strong> <span id="historyBalance"></span>
                </div>
            </div>

            <table class="table transaction-table mt-3">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Payment Amount</th>
                        <th>Payment Date</th>
                    </tr>
                </thead>
                <tbody id="historyTransactionsBody">
                    <!-- Rendered dynamically -->
                </tbody>
            </table>

            <button class="btn transaction-close-btn mt-3" id="closeTransactionBtn">
                Close
            </button>

        </div>
    </div>


    <!-- ============================= -->
    <!-- Edit Transaction Overlay -->
    <!-- ============================= -->
    <div class="overlay d-none" id="editTransactionOverlay">
        <div class="overlay-content p-4">

            <button class="overlay-close" id="closeEditTransaction">✕</button>

            <h5 class="mb-3">Edit Transaction History</h5>

            <!-- Dynamic Summary -->
            <div class="transaction-summary mb-3">
                <div><strong>Customer:</strong> <span id="editCustomerName"></span></div>
                <div><strong>Total Price:</strong> <span id="editTotalPrice"></span></div>
                <div class="balance">
                    <strong>Current Balance:</strong> <span id="editCurrentBalance"></span>
                </div>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-2">
                <strong>Transactions</strong>
                <button class="btn btn-green btn-sm" id="addTransactionBtn">
                    + Add Transaction
                </button>
            </div>

            <!-- Empty container (NO HARDCODE) -->
            <div id="transactionsContainer"></div>

            <div class="d-flex gap-3 mt-4">
                <button class="btn btn-danger w-50" id="cancelEditTransaction">
                    Cancel
                </button>
                <button class="btn btn-green w-50" id="saveTransactionsBtn">
                    Save Changes
                </button>
            </div>

        </div>
    </div>

    <!-- Scripts -->
    <script type="module" src="payments.js"></script>
    <script src="../../../assets/bootstrap/bootstrap.bundle.min.js"></script>

</body>
